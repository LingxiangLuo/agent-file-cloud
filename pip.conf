# Agent File Cloud - pip 镜像源配置
# 使用清华大学镜像源，加速 Python 包安装

[global]
index-url = https://pypi.tuna.tsinghua.edu.cn/simple
trusted-host = pypi.tuna.tsinghua.edu.cn
timeout = 120

[install]
trusted-host = pypi.tuna.tsinghua.edu.cn
disable-pip-version-check = true

